version: "3.9"

networks:
  raft-net:
    driver: bridge

services:
  replica1:
    build:
      context: ./replica
      dockerfile: Dockerfile
    container_name: miniraft-replica1
    networks:
      - raft-net
    environment:
      - REPLICA_ID=replica1
      - PEERS=replica2:9001,replica3:9001,replica4:9001
      - GRPC_PORT=9001
      - HTTP_PORT=8081
      - DATA_DIR=/data
      - GATEWAY_URL=http://gateway:8080
      - LOG_LEVEL=info
    volumes:
      - ./logs/replica1:/data
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  replica2:
    build:
      context: ./replica
      dockerfile: Dockerfile
    container_name: miniraft-replica2
    networks:
      - raft-net
    environment:
      - REPLICA_ID=replica2
      - PEERS=replica1:9001,replica3:9001,replica4:9001
      - GRPC_PORT=9001
      - HTTP_PORT=8081
      - DATA_DIR=/data
      - GATEWAY_URL=http://gateway:8080
      - LOG_LEVEL=info
    volumes:
      - ./logs/replica2:/data
    ports:
      - "8082:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  replica3:
    build:
      context: ./replica
      dockerfile: Dockerfile
    container_name: miniraft-replica3
    networks:
      - raft-net
    environment:
      - REPLICA_ID=replica3
      - PEERS=replica1:9001,replica2:9001,replica4:9001
      - GRPC_PORT=9001
      - HTTP_PORT=8081
      - DATA_DIR=/data
      - GATEWAY_URL=http://gateway:8080
      - LOG_LEVEL=info
    volumes:
      - ./logs/replica3:/data
    ports:
      - "8083:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  replica4:
    build:
      context: ./replica
      dockerfile: Dockerfile
    container_name: miniraft-replica4
    networks:
      - raft-net
    environment:
      - REPLICA_ID=replica4
      - PEERS=replica1:9001,replica2:9001,replica3:9001
      - GRPC_PORT=9001
      - HTTP_PORT=8081
      - DATA_DIR=/data
      - GATEWAY_URL=http://gateway:8080
      - LOG_LEVEL=info
    volumes:
      - ./logs/replica4:/data
    ports:
      - "8084:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: miniraft-gateway
    networks:
      - raft-net
    environment:
      - GATEWAY_PORT=8080
      - REPLICA_ADDRS=replica1:9001,replica2:9001,replica3:9001,replica4:9001
      - REPLICA_HTTP=http://replica1:8081,http://replica2:8081,http://replica3:8081,http://replica4:8081
      - LOG_LEVEL=info
    ports:
      - "8080:8080"
    depends_on:
      replica1:
        condition: service_healthy
      replica2:
        condition: service_healthy
      replica3:
        condition: service_healthy
      replica4:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: miniraft-frontend
    networks:
      - raft-net
    ports:
      - "3000:3000"
    depends_on:
      - gateway
    restart: unless-stopped
